<!DOCTYPE html>
<html>
  <head>
    <style>
    .container {
      font-family:arial;
      max-width:500px;
    }
    .video-row{
      margin-bottom:15px;
      font-size:0;
    }
    .thumbnail{
      display:inline-block;
      vertical-align:top;
      width:150px;
      max-width:35%;
      height:85px;
      background-color:black;
      color:white;
      font-size:14px;
    }
    .info{
      display:inline-block;
      vertical-align:top;
      width:calc(100%-160px);
      margin-left:10px;
      font-size:14px;
    }
    .title{
      font-weight:bold;
      margin:0 0 5px 0;
    }
    .author, .stats{
      color:gray;
      font-size:12px;
      margin:2px 0;
    }
    </style>

  </head>
  <body>
    <div class="container">
    <div class="video-row">
      <div class="thumbnail">
    <img  class="thumbnails"src="thumbnails/selftaught.avif">
    <div class="placeholder">THUMBNAIL</div>
    </div>
    <div class="info">
    <p class="title"> How to complete against CS degrees (as a self-taught dev)</p>
    <p class="author">
      109K views . 4 years ago
    </p>
    <p class="stats">SuperSimpleDev</p>
    </div>
    </div>
    </div>
    
  </body>
</html>
