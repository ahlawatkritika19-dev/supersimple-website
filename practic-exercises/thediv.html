<!DOCTYPE html>
<html>
  <head>
<style>
  .red-square{
    width:100px;
    height:100px;
   background-color:red;
   display:inline-block
  }
  .green-circle{
    background-color:green;
    width:100px;
    height:100px;
    border-radius:50px;
    display: inline-block;
  }
  .rectangle-grey{
    border:1px solid rgb(50,52,54);
    width:300px;
    height:55px;
    padding:15px;
    width:fit-content;
  }
</style>
  </head>
  <body>
    <h3>redsquare</h3>
    <div class="red-square"></div>
     <h3>green circle</h3>
    <div class="green-circle"></div>
  
      <div class="rectangle-grey">
      <p class="our-p">Satisfied with our service ?</p>
      <button class="yes-p">Yes</button>
      <button class="no-p">No</button>
    </div>
    
    
  </body>
</html>
