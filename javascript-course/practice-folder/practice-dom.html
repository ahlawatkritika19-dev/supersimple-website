<!DOCTYPE html>
<html>
  <head>
    <title>practice-dom</title>
  </head>
  <body>
    <button>9a</button>
    <button class="js-button-9b">9b</button>
    <button onclick="UpdateChoice('head')">head</button>
    <button onclick="UpdateChoice('tail')">tail</button>
    <p class="js-choice-display"></p>
    <input  type="text"  placeholder="Name" class="js-name-input" >
    <button onclick="
    displayName()
    ">Submit</button>
    <p class="js-message"></p>

    <input placeholder="cost of order" class="js-cost-input" onkeydown="
    if(event.key === 'Enter'){
      calculateTotal();
    }">

    <button onclick="calculateTotal()";>Calculate</button>
    <p class="js-total-cost"></p>

    <input placeholder="Type something...." class="js-input"  onkeyup="
    handleKeyUp();
    ">
    <p class="js-display"></p>
<script>
  const button9a =document.querySelector('button');
  console.log('button9a');
const button9b = document.querySelector('.js-button-9b');
button9b.innerText = '9b done!';
console.log('button9b');

function UpdateChoice(choice){
const displayElement = document.querySelector('.js-choice-display');
displayElement.innerText = `you chose:${choice}`;
}
function displayName(){
  const inputElement = document.querySelector('.js-name-input');
  const name = inputElement.value;
  
  
  document.querySelector('.js-message')
  .innerHTML = `your name is :${name}`;
}

function calculateTotal(){
  const inputElement= document.querySelector('.js-cost-input');
  let cost =Number(inputElement.value);

  if(cost<40){
    cost = (cost*100 + 1000)/100;
  }
  document.querySelector('.js-total-cost')
  .innerHTML = `$${cost}`;
}


function handleKeyUp(){
  const inputElement = document.querySelector('.js-input');
  document.querySelector('.js-display')
  .innerHTML = inputElement.value;
}


</script>
 </body>
</html>
