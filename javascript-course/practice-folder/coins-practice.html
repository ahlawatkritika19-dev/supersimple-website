<!DOCTYPE html>
<html>
  <head>
    <title>coin-flip-game</title>
  </head>
  <body>
    <button onclick="playGame('heads')">Heads</button>
    <button onclick="playGame('tails')">Tails</button>
    <button onclick="resetScore()">Reset Score</button>
    <script>
      let score =JSON.parse(localStorage.getItem('score')) || {
        wins: 0,
        losses: 0
      };
      function playGame(guess){
        const randomNumber = Math.random();
        const result =randomNumber < 0.5 ? 'heads' : 'tails';
        if (guess === result){
          score.wins++;
          console.log(`It was ${result}. You win!`);
          alert(`It was ${result}.You win!`);
        } else {
          score.losses++;
          console.log(`It was ${result}.You lose!`);
          alert(`It was ${result}.You lose!`);
        }
        localStorage.setItem('score', JSON.stringify(score));

        console.log(`Wins: ${score.wins}, Losses: ${score.losses}`);
      }
      function resetScore(){
        score.wins = 0;
        score.losses = 0;
        localStorage.removeItem('score');
        console.log('Score has been reset.');
        console.log(`Wins: ${score.wins},Losses:${score.losses}`);
        alert('score has been reset!'); 
      }
    </script>
  </body>
</html>
