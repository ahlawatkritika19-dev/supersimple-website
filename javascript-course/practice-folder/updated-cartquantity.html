<!DOCTYPE html>
<html>

</head>
  <body>
   <script>
  let cartQuantity=0;
    function  addTOcart(){
  if(cartQuantity+1>10){
    alert('cart is full!');
  }  
  else{
    cartQuantity+=1;
    alert(`cartQuantity is :${cartQuantity}`);
  }}
function  removeFromCart(){
  if(cartQuantity-2<0){
    alert('no enough items in the cart');
  } else{
    cartQuantity-=2;
    alert(`cartQuantity is :${cartQuantity}`);
  }
}


</script>




   <button onclick="
    console.log(`cart quantity:${cartQuantity}`);
    ">Show quantity</button>
