<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body {
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .send-button{
        background-color: rgb(25,135,84);
        color:white;
        border: none;
        padding: 12px 20px;
        margin-left: 10px;
        border-radius: 10px;
        font-size: 15px;
        cursor:pointer;
      }

      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }
      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }

      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;

      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }

      .chat-message-robot{
        display: flex;
        align-items: start;
      }

      .chat-message-text {
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }


      .chat-message-profile {
        width: 45px;
      }

      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .loading-spinner {
        display: inline-block;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg);}
        100% {transform: rotate(360deg);}
      }
     
    </style>
    <link rel="styleSheet" href="https://cloudflare.com">
  </head>
  <body>
    <div class="js-container"></div>

    

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({chatMessages, setChatMessages }) {
      const [inputText, setInputText] = React.useState('');

      function saveInputText(event) {
      setInputText(event.target.value);
      }

       function   sendMessage(){
         const newChatMessages = [
           ...chatMessages,
           {
            message: inputText,
            sender: 'user',
            id: crypto.randomUUID()
           }
        ];


        setChatMessages(newChatMessages);

        const response = Chatbot.getResponse(inputText);
        setChatMessages([
           ...newChatMessages,
           {
            message: response,
            sender: 'robot',
            id: crypto.randomUUID()
           }
        ]);


        setInputText('');
       }

       return (
        <div className="chat-input-container">
           <input 
             placeholder="Send a message to Chatbot" 
             size="30" 
             onChange={saveInputText}
             value={inputText}
             className="chat-input"
           />
           <button
             onClick={sendMessage}
            className = "send-button"
           >Send</button>
         </div>
       );
      }

      function ChatMessage({ message, sender }) {
      // const message =  props.message;
       // const sender = props.sender;
       // const { message, sender } = props;
       /*
       if (sender === 'robot') {
          return(
           <div>
             <img src="robot.png" width="50" />
              {message}
            </div>
          );
       }
       */

       return (
        <div className={sender ==='user' ? 'chat-message-user' : 'chat-message-robot'}>
          {sender === 'robot' && (
            <img src="robot.png"  className="chat-message-profile" />
          )}
          <div className= "chat-message-text">
          {message}
          </div>
          {sender === 'user' && (
            <img src="user.png"  className="chat-message-profile"/>
          )}
        </div>
       ); 
      }

      function ChatMessages({chatMessages, isTyping }){
        const chatMessagesRef =  React.useRef(null); 
        
        React.useEffect(() => {
            const containerElem =  chatMessagesRef.current;
            if (containerElem) {
              containerElem.scrollTop = containerElem.
              scrollHeight;
            }
           }, [chatMessages, isTyping]);


       return (
        <div className= "chat-messages-container"
        ref={chatMessagesRef}>
         {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage 
                  message={chatMessage.message}
                  sender= {chatMessage.sender} 
                  key={chatMessage.id}
                />
              );
            })}
          
        
      
        {isTyping && (
      <div className="chat-message robot typing">
        <div className="avatar robot-avatar">
          <i className= "fas fa-robot"></i>
          </div>
          <div className= "message-text loading-spinner"  style={{ display: 'flex', alignItems: 'center'}}>
            <style>{`
              @keyframes custom-spin{
              0% { transform: rotate(0deg); } 
              100% { transform: rotate(360deg); }
              }
              .forced-spinner{
              width: 14px;
              height: 14px;
              border: 2px solid #ccc;
              border-top: 2px solid #007bff;
              border-radius: 50%;
              display: inline-block;
              margin-right: 8px;
              animation: custom-spin 0.8s linear infinite;
              }
              `}</style>
              <span className="forced-spinner"></span>

              Robot is thinking...
              </div>
              </div>
          )}
          </div>
        );
      }

      function App() {
 const [chatMessages, setChatMessages]= React.useState([]);
  const [isTyping, setIsTyping] =  React.useState(false);
      // const [chatMessages, setChatMessages] = array;
      // const chatMessages = array[0];
      // const setChatMessages =  array[1];


       return (
           <div className= "app-container">
             <ChatMessages chatMessages={chatMessages} isTyping={isTyping} />
             <ChatInput 
               chatMessages={chatMessages}
               setChatMessages={setChatMessages}
               setIsTyping={setIsTyping}
             />
               </div>
        );
      }
    
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
